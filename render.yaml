services:
  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  - type: web
    name: tradebothub-backend
    runtime: python
    rootDir: backend
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tradebothub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tradebothub-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://btfv2.netlify.app
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7

  # ── Bot Worker ──────────────────────────────────────────────────────────────
  - type: worker
    name: tradebothub-bot-worker
    runtime: python
    rootDir: backend
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.workers.bot_worker
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tradebothub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tradebothub-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: tradebothub-backend
          envVarKey: SECRET_KEY
      - key: ENCRYPTION_KEY
        fromService:
          type: web
          name: tradebothub-backend
          envVarKey: ENCRYPTION_KEY

  # ── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: tradebothub-redis
    region: oregon
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  - name: tradebothub-db
    plan: free
    region: oregon
    databaseName: tradebothub
    user: tradebothub
